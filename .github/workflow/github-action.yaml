name: LocalStack DevOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-latest

    services:
      localstack:
        image: localstack/localstack:latest
        ports:
          - 4566:4566
        env:
          SERVICES: s3,iam,ec2,lambda,apigateway
          DEBUG: 1

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ---------------------------
      # Terraform Setup
      # ---------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: infra

      - name: Terraform Validate
        run: terraform validate
        working-directory: infra

      - name: Terraform Plan
        run: terraform plan
        working-directory: infra

      - name: Terraform Apply (LocalStack)
        run: terraform apply -auto-approve
        working-directory: infra

      # ---------------------------
      # Docker Build (Simulated ECR flow)
      # ---------------------------
      - name: Build Docker Image
        run: |
          docker build -t demo-app:latest .

      - name: Tag Docker Image (ECR style simulation)
        run: |
          docker tag demo-app:latest localstack/ecr-demo:latest

      # ---------------------------
      # Simulate Push to LocalStack ECR
      # ---------------------------
      - name: Login to LocalStack ECR
        run: |
          echo "Simulating ECR login (LocalStack)"

      - name: Push Image (Simulation)
        run: |
          docker images
          echo "Image ready for ECS deployment simulation"

      # ---------------------------
      # Final Output Check
      # ---------------------------
      - name: Verify LocalStack Services
        run: |
          curl http://localhost:4566/_localstack/health
